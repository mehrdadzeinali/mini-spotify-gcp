<div class="app-shell">

  <aside class="sidebar">
    <div class="sidebar-logo">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>
      <span>Wavely</span>
    </div>
    <nav>
      <a class="nav-item active" href="#">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        Home
      </a>
      <a class="nav-item" href="#">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        Search
      </a>
      <a class="nav-item" href="#">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
        Library
      </a>
    </nav>
    <div class="sidebar-playlists">
      <p class="section-title">Playlists</p>
      <a class="playlist-item" href="#">Chill Vibes</a>
      <a class="playlist-item" href="#">Deep Focus</a>
      <a class="playlist-item" href="#">Late Night</a>
    </div>
    <button class="logout-btn" (click)="logout()">Sign out</button>
  </aside>

  <main class="main-content">
    <div class="section-header">
      <h2>Good evening</h2>
      <p>{{ userEmail }}</p>
    </div>
    <div class="songs-grid">
      <div class="song-card" *ngFor="let song of songs" (click)="playSong(song)">
        <div class="song-cover">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>
        </div>
        <p class="song-title">{{ song.title }}</p>
        <p class="song-artist">{{ song.artist }}</p>
      </div>
    </div>
  </main>

  <footer class="player-bar">
    <div class="player-info">
      <div class="player-cover"></div>
      <div>
        <p class="player-title">{{ currentSong?.title || 'No song playing' }}</p>
        <p class="player-artist">{{ currentSong?.artist || '' }}</p>
      </div>
    </div>
    <div class="player-controls">
      <button (click)="previous()">⏮</button>
      <button class="play-btn" (click)="togglePlay()">{{ isPlaying ? '⏸' : '▶' }}</button>
      <button (click)="next()">⏭</button>
    </div>
    <div class="player-volume">
      <span>🔊</span>
    </div>
  </footer>

</div>
