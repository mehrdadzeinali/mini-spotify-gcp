steps:
  # Build and push songs-service
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'buildx'
      - 'build'
      - '--platform'
      - 'linux/amd64'
      - '-t'
      - 'europe-west1-docker.pkg.dev/mini-spotify-gcp/wavely-repo/songs-service:latest'
      - './backend-gke/songs-service'
      - '--push'

  # Build and push playlists-service
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'buildx'
      - 'build'
      - '--platform'
      - 'linux/amd64'
      - '-t'
      - 'europe-west1-docker.pkg.dev/mini-spotify-gcp/wavely-repo/playlists-service:latest'
      - './backend-gke/playlists-service'
      - '--push'

  # Build and push streaming-service
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'buildx'
      - 'build'
      - '--platform'
      - 'linux/amd64'
      - '-t'
      - 'europe-west1-docker.pkg.dev/mini-spotify-gcp/wavely-repo/streaming-service:latest'
      - './backend-gke/streaming-service'
      - '--push'

  # Deploy to GKE
  - name: 'gcr.io/cloud-builders/kubectl'
    args:
      - 'rollout'
      - 'restart'
      - 'deployment'
      - 'songs-service'
      - 'playlists-service'
      - 'streaming-service'
    env:
      - 'CLOUDSDK_COMPUTE_ZONE=europe-west1-b'
      - 'CLOUDSDK_CONTAINER_CLUSTER=wavely-cluster'

  # Inject Angular environment file from Secret Manager
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - 'mkdir -p frontend/src/environments && gcloud secrets versions access latest --secret=angular-environment > frontend/src/environments/environment.ts'

  # Build frontend
  - name: 'node:20'
    entrypoint: 'bash'
    args:
      - '-c'
      - 'cd frontend && npm install --legacy-peer-deps && npm run build'

  # Deploy frontend to Firebase Hosting
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - 'cd frontend && firebase deploy --only hosting --token $$FIREBASE_TOKEN'
    secretEnv: ['FIREBASE_TOKEN']

availableSecrets:
  secretManager:
    - versionName: projects/mini-spotify-gcp/secrets/firebase-token/versions/latest
      env: 'FIREBASE_TOKEN'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY