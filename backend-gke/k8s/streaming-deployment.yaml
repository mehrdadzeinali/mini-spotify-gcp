apiVersion: apps/v1
kind: Deployment
metadata:
  name: streaming-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: streaming-service
  template:
    metadata:
      labels:
        app: streaming-service
    spec:
      containers:
        - name: streaming-service
          image: europe-west1-docker.pkg.dev/mini-spotify-gcp/wavely-repo/streaming-service:latest
          ports:
            - containerPort: 3003
          env:
            - name: PORT
              value: "3003"
---
apiVersion: v1
kind: Service
metadata:
  name: streaming-service
  annotations:
    cloud.google.com/backend-config: '{"default": "streaming-backend-config"}'
spec:
  selector:
    app: streaming-service
  ports:
    - protocol: TCP
      port: 3003
      targetPort: 3003
  type: NodePort
